name: 🚀 Deploy — management.gennis.uz

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        id: deploy
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            APP_DIR=/home/managementv2

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone ${{ secrets.GIT_REPO_URL }} "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin master
            git reset --hard origin/master

            docker compose up --build -d

            echo "Waiting for app..."
            for i in $(seq 1 12); do
              if docker compose exec -T app curl -sf http://localhost:8000/ > /dev/null 2>&1; then
                echo "App is up."
                break
              fi
              sleep 5
            done

            docker compose exec -T app alembic -c alembic_v2.ini upgrade head
            docker image prune -f

      # ── Muvaffaqiyatsiz bo'lsa: logni Telegraph'ga yuklaydi ─────────────────
      - name: Get error logs & post to Telegraph
        id: telegraph
        if: steps.deploy.outcome == 'failure'
        env:
          TELEGRAPH_TOKEN: ${{ secrets.TELEGRAPH_TOKEN }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          # SSH key yozish
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Docker log'larini serverdan olish
          LOG=$(ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            "${SERVER_USER}@${SERVER_HOST}" \
            "cd /home/managementv2 && docker compose logs --tail=40 app 2>&1 || echo 'Container ishlamayapti'" 2>&1) || LOG="SSH ulanishda xato"

          rm -f ~/.ssh/deploy_key

          # Log'ni faylga yozish
          echo "$LOG" > /tmp/deploy.log
          echo "=== LOG (first 5 lines) ===" && head -5 /tmp/deploy.log || echo "(empty)"

          # Telegraph sahifasi yaratish — stderr ham ko'rinsin
          DEPLOY_TITLE="Deploy xato — $(date '+%Y-%m-%d %H:%M')" \
          TELEGRAPH_TOKEN="${TELEGRAPH_TOKEN}" \
          python3 -u .github/scripts/post_telegraph.py /tmp/deploy.log 2>&1 | tee /tmp/tg_url.txt

          URL=$(tail -1 /tmp/tg_url.txt)
          echo "=== Telegraph URL: $URL ==="
          echo "url=$URL" >> $GITHUB_OUTPUT

      # ── Telegram: muvaffaqiyatli ─────────────────────────────────────────────
      - name: Notify Telegram — success
        if: steps.deploy.outcome == 'success'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          MSG="✅ Deploy muvaffaqiyatli!%0A%0A🌐 management.gennis.uz%0A🌿 master%0A📝 ${SHORT_SHA}%0A👤 ${ACTOR}%0A💬 ${COMMIT_MSG}%0A%0A🔗 ${RUN_URL}"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}&parse_mode=HTML&text=${MSG}"

      # ── Telegram: muvaffaqiyatsiz + Telegraph linki ──────────────────────────
      - name: Notify Telegram — failure
        if: steps.deploy.outcome == 'failure'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          LOG_URL: ${{ steps.telegraph.outputs.url }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          MSG="❌ Deploy MUVAFFAQIYATSIZ!%0A%0A🌐 management.gennis.uz%0A🌿 master%0A📝 ${SHORT_SHA}%0A👤 ${ACTOR}%0A💬 ${COMMIT_MSG}%0A%0A📋 Xato log: ${LOG_URL}%0A🔗 GitHub: ${RUN_URL}"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}&parse_mode=HTML&text=${MSG}"
