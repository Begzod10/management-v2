name: 🚀 Deploy — management.gennis.uz

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            APP_DIR=/home/managementv2

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone ${{ secrets.GIT_REPO_URL }} "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin master
            git reset --hard origin/master

            docker compose up --build -d

            echo "Waiting for app to start..."
            for i in $(seq 1 12); do
              if docker compose exec -T app curl -sf http://localhost:8000/ > /dev/null 2>&1; then
                echo "App is up."
                break
              fi
              echo "  attempt $i/12..."
              sleep 5
            done

            docker compose exec -T app alembic -c alembic_v2.ini upgrade head
            docker image prune -f

      - name: Notify Telegram — success
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          MSG="✅ Deploy muvaffaqiyatli!%0A%0A🌐 management.gennis.uz%0A🌿 Branch: master%0A📝 Commit: ${SHORT_SHA}%0A👤 ${ACTOR}%0A💬 ${COMMIT_MSG}%0A%0A🔗 ${RUN_URL}"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}&parse_mode=HTML&text=${MSG}"

      - name: Notify Telegram — failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          MSG="❌ Deploy MUVAFFAQIYATSIZ!%0A%0A🌐 management.gennis.uz%0A🌿 Branch: master%0A📝 Commit: ${SHORT_SHA}%0A👤 ${ACTOR}%0A💬 ${COMMIT_MSG}%0A%0A⚠️ Log: ${RUN_URL}"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}&parse_mode=HTML&text=${MSG}"
