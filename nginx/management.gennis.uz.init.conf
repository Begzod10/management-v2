# TEMPORARY — use only for initial Let's Encrypt cert setup.
# After getting the cert, replace this with management.gennis.uz.conf (HTTPS version).
server {
    listen 80;
    server_name management.gennis.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
