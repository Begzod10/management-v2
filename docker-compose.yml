# ─── Port security ────────────────────────────────────────────────────────────
# System nginx (host) handles 80/443 and proxies to app on 127.0.0.1:8000.
# PostgreSQL (5432) and Redis (6379) have NO host-port bindings.
# ─────────────────────────────────────────────────────────────────────────────

services:

  app:
    build: .
    container_name: management_app
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8002:8000"
    volumes:
      - ./static:/app/static
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery:
    build: .
    container_name: management_celery
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info -Q celery
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - app
      - redis
    networks:
      - backend

  celery-beat:
    build: .
    container_name: management_celery_beat
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - celery
      - redis
    networks:
      - backend

  # ⛔ NO ports — only reachable inside Docker network
  db:
    image: postgres:15-alpine
    container_name: management_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-management}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ⛔ NO ports — only reachable inside Docker network
  redis:
    image: redis:7-alpine
    container_name: management_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  backend:
    driver: bridge
